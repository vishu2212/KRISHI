<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="KIYARI AI — intelligent voice assistant for the Kiyari soil & crop learning board game." />
  <title>KIYARI AI — Voice Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="voice-wave-container" id="voiceWaveContainer">
    <canvas id="horizontalWaveform" class="voice-wave-canvas"></canvas>
    <div class="voice-wave-mask"></div>
  </div>

  <!-- Bottom ambient glow -->
  <div class="bottom-glow"></div>

  <div class="page-container">

    <!-- ─── Ambient Floating Identity ─── -->
    <header class="ambient-identity" id="ambientHeader">
      <div class="logo-mark"></div>
      <span class="identity-label">KIYARI AI</span>
    </header>

    <!-- ─── Hero Card ─── -->
    <div class="hero-card" id="heroCard">

      <!-- Title -->
      <div class="hero-title-area">
        <h1 class="hero-title">
          Talk to <span class="hero-accent">KIYARI AI</span>
        </h1>
      </div>

      <!-- DNA Centerpiece (Full-width waveform handles the visual space) -->
      <div class="orb-area">
        <div class="orb-wrapper">
          <!-- Vertical layout spacer: DNA Waveform flows unobstructed through this central zone -->
        </div>

        <!-- CTA / status button -->
        <div class="cta-area">
          <button class="speak-btn" id="speakBtn">
            <span class="pdot" id="pdot"></span>
            <span id="speakBtnLabel">Say 'hey kiyari' to wake up</span>
          </button>
        </div>

        <!-- Live transcript / AI reply box -->
        <div class="feedback-area" id="feedbackArea" style="display:none;">
          <div class="transcript-box" id="transcriptBox"></div>
        </div>

        <!-- Error box -->
        <div class="error-box" id="errorBox" style="display:none;"></div>

        <!-- Text input fallback -->
        <div class="text-input-area">
          <input type="text" id="textInput" placeholder="Or type your question here…" />
          <button class="send-btn" id="btnSend">Send</button>
        </div>
      </div>
    </div>

    <!-- ─── Feature Cards ─── -->
    <div class="features-grid">
      <div class="feature-card">
        <h3 class="feature-title">Voice Guidance</h3>
        <p class="feature-desc">Get real-time explanations about gameplay, cards, soils, and climate interactions.</p>
      </div>
      <div class="feature-card">
        <h3 class="feature-title">Educational AI</h3>
        <p class="feature-desc">Understand ecosystem logic and farming strategy through interactive conversation.</p>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
